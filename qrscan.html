<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <title>NEU Library — QR Check-in</title>
    <link rel="icon" type="image/x-icon" href="img/neulogo.png" />
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link rel="stylesheet" href="css/qrscan.css" />
  </head>
  <body>
    <!-- Admin access guard — redirects immediately if not coming from admin dashboard -->
    <script>
      if (sessionStorage.getItem('adminQR') !== '1') {
        window.location.replace('index.html');
      }
      // Keep token alive — don't remove it so refresh still works
    </script>

    <nav>
      <div class="nav-left">
        <img src="img/neulogo.png" alt="NEU" class="nav-logo" onerror="this.style.display='none'">
        QR Check-in
      </div>
      <a href="admindashboard.html" class="btn-back">← Back to Dashboard</a>
    </nav>

    <main>
      <div class="card">
        <div class="card-head">
          <h2>Quick QR Check-in</h2>
          <p>Tap the button below to open your camera</p>
        </div>
        <div class="card-body">

          <div id="cameraSection">
            <button id="startCamBtn">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
              Tap to Start Camera &amp; Scan QR
            </button>

            <div class="viewfinder" id="viewfinder">
              <video id="video" autoplay playsinline muted></video>
              <div class="corners"><div class="frame"><span></span><div class="scanline"></div></div></div>
            </div>
          </div>

          <div class="status info" id="statusMsg">Press the button above to allow camera access.</div>

          <div class="user-card" id="userCard">
            <div class="user-avatar-wrap" id="uAvatar">
              <img id="uAvatarImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;" />
              <div id="uInitial" style="display:flex;width:100%;height:100%;align-items:center;justify-content:center;">?</div>
            </div>
            <div class="uinfo">
              <div class="u-welcome" id="uWelcome">Hello!</div>
              <div class="u-subtitle" id="uSubtitle">Welcome to NEU Library</div>
              <strong id="uName">—</strong>
              <span id="uProgram">—</span><br>
              <span id="uEmail" style="font-size:11px;opacity:0.7">—</span>
            </div>
          </div>

          <span class="reason-label">Reason for visit: <span class="kbd-hint-label">(press 1–4, then Enter)</span></span>
          <div class="reasons" id="reasonSection">
            <button class="rbtn" data-r="Reading"><span class="kbd-num">1</span>📖 Reading</button>
            <button class="rbtn" data-r="Researching"><span class="kbd-num">2</span>🔬 Researching</button>
            <button class="rbtn" data-r="Use of Computer"><span class="kbd-num">3</span>💻 Computer</button>
            <button class="rbtn" data-r="Meeting"><span class="kbd-num">4</span>👥 Meeting</button>
          </div>

          <button id="checkinBtn" disabled>Scan QR code first</button>

          <div class="foot">Go back to <a href="admindashboard.html">Admin Dashboard</a></div>
        </div>
      </div>
    </main>

    <canvas id="qrCanvas"></canvas>

    <script src="js/qrscan.js"></script>
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
