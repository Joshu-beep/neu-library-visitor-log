<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEU Library — QR Check-in</title>
    <link rel="icon" type="image/x-icon" href="neulogo.png" />
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
      :root {
        --blue: #001f54;
        --gold: #f59e0b;
        --bg: #f4f6f9;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, sans-serif; }
      body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

      nav {
        background: var(--blue); color: white; padding: 12px 24px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 4px solid var(--gold);
      }
      .nav-left { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; }
      .nav-logo { width: 30px; height: 30px; object-fit: contain; border-radius: 50%; background: white; padding: 2px; }
      .btn-back {
        color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.4);
        padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600;
      }

      main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

      .card {
        background: white; border-radius: 16px; width: 100%; max-width: 460px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1); overflow: hidden;
      }
      .card-head {
        background: var(--blue); color: white; text-align: center;
        padding: 20px; border-bottom: 3px solid var(--gold);
      }
      .card-head h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
      .card-head p { font-size: 13px; opacity: 0.8; }
      .card-body { padding: 24px; }

      /* ── Camera section ── */
      #cameraSection { margin-bottom: 16px; }

      .viewfinder {
        position: relative; background: #0f172a; border-radius: 12px;
        overflow: hidden; aspect-ratio: 1; width: 100%; margin-bottom: 10px;
        display: none;
      }
      .viewfinder.active { display: block; }
      #video { width: 100%; height: 100%; object-fit: cover; display: block; }

      /* animated corners */
      .corners { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
      .frame { width: 55%; height: 55%; position: relative; }
      .frame::before, .frame::after, .frame span::before, .frame span::after {
        content: ''; position: absolute; width: 22px; height: 22px;
        border-color: var(--gold); border-style: solid;
      }
      .frame::before  { top:0;    left:0;  border-width: 3px 0 0 3px; }
      .frame::after   { top:0;    right:0; border-width: 3px 3px 0 0; }
      .frame span::before { bottom:0; left:0;  border-width: 0 0 3px 3px; }
      .frame span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; }
      .scanline {
        position: absolute; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        animation: scan 2s ease-in-out infinite;
      }
      @keyframes scan { 0%,100%{top:5%} 50%{top:95%} }

      /* start button */
      #startCamBtn {
        width: 100%; padding: 16px; border-radius: 10px; border: none;
        background: var(--blue); color: white; font-size: 16px; font-weight: 700;
        cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        transition: background 0.2s; margin-bottom: 10px;
      }
      #startCamBtn:hover { background: #002a70; }
      #startCamBtn.hide { display: none; }

      .status {
        text-align: center; font-size: 13px; padding: 8px 12px;
        border-radius: 8px; margin-bottom: 14px; display: none;
      }
      .status.info    { display: block; background: #eff6ff; color: #1d4ed8; }
      .status.ok      { display: block; background: #f0fdf4; color: #16a34a; }
      .status.error   { display: block; background: #fef2f2; color: #dc2626; }
      .status.warning { display: block; background: #fffbeb; color: #b45309; }

      /* user preview */
      .user-card {
        display: none; background: #f0f9ff; border: 1.5px solid #7dd3fc;
        border-radius: 10px; padding: 14px; margin-bottom: 14px;
        align-items: center; gap: 12px;
      }
      .user-card.show { display: flex; }
      .avatar {
        width: 46px; height: 46px; border-radius: 50%; background: var(--blue);
        color: white; font-size: 20px; font-weight: 700;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      .uinfo strong { font-size: 15px; color: #0c4a6e; display: block; }
      .uinfo span   { font-size: 12px; color: #0369a1; }

      /* reason grid */
      .reason-label { font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 10px; display: block; }
      .reasons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
      .rbtn {
        padding: 12px 8px; border: 1.5px solid var(--border); border-radius: 8px;
        background: white; font-size: 13px; font-weight: 600; color: #475569;
        cursor: pointer; transition: all 0.15s;
      }
      .rbtn.sel { border-color: var(--blue); background: #eef2ff; color: var(--blue); }

      /* checkin button */
      #checkinBtn {
        width: 100%; padding: 15px; border-radius: 10px; border: none;
        background: #94a3b8; color: white; font-size: 16px; font-weight: 700;
        cursor: not-allowed; transition: all 0.2s;
      }
      #checkinBtn.ready { background: #16a34a; cursor: pointer; }
      #checkinBtn.ready:hover { background: #15803d; }

      .foot { text-align: center; margin-top: 14px; font-size: 13px; color: #94a3b8; }
      .foot a { color: var(--blue); font-weight: 600; text-decoration: none; }

      canvas { display: none; }
    </style>
  </head>
  <body>

    <nav>
      <div class="nav-left">
        <img src="neulogo.png" alt="NEU" class="nav-logo" onerror="this.style.display='none'">
        QR Check-in
      </div>
      <a href="index.html" class="btn-back">← Back</a>
    </nav>

    <main>
      <div class="card">
        <div class="card-head">
          <h2>Quick QR Check-in</h2>
          <p>Tap the button below to open your camera</p>
        </div>
        <div class="card-body">

          <div id="cameraSection">
            <button id="startCamBtn">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
              Tap to Start Camera &amp; Scan QR
            </button>

            <div class="viewfinder" id="viewfinder">
              <video id="video" autoplay playsinline muted></video>
              <div class="corners"><div class="frame"><span></span><div class="scanline"></div></div></div>
            </div>
          </div>

          <div class="status info" id="statusMsg">Press the button above to allow camera access.</div>

          <div class="user-card" id="userCard">
            <div class="avatar" id="uInitial">?</div>
            <div class="uinfo">
              <strong id="uName">—</strong>
              <span id="uProgram">—</span><br>
              <span id="uEmail" style="font-size:11px;opacity:0.7">—</span>
            </div>
          </div>

          <span class="reason-label">Reason for visit:</span>
          <div class="reasons">
            <button class="rbtn" data-r="Reading">📖 Reading</button>
            <button class="rbtn" data-r="Researching">🔬 Researching</button>
            <button class="rbtn" data-r="Use of Computer">💻 Computer</button>
            <button class="rbtn" data-r="Meeting">👥 Meeting</button>
          </div>

          <button id="checkinBtn" disabled>Scan QR code first</button>

          <div class="foot">Prefer to log in? <a href="index.html">Sign in here</a></div>
        </div>
      </div>
    </main>

    <canvas id="qrCanvas"></canvas>

    <script>
      // Wait for all scripts to load
      window.addEventListener('load', function () {

        const SUPABASE_URL = 'https://ruajjuxabwfqpawpjosl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1YWpqdXhhYndmcXBhd3Bqb3NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTg0MjksImV4cCI6MjA4OTAzNDQyOX0.O1ZbG4vC6q4DxQKTq664i3e4xwUYcvgVDOsuNMDNK4I';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const video      = document.getElementById('video');
        const canvas     = document.getElementById('qrCanvas');
        const ctx        = canvas.getContext('2d');
        const viewfinder = document.getElementById('viewfinder');
        const startBtn   = document.getElementById('startCamBtn');
        const statusMsg  = document.getElementById('statusMsg');
        const checkinBtn = document.getElementById('checkinBtn');

        let scannedUid   = null;
        let reason       = null;
        let scanning     = false;
        let raf          = null;

        // ── Helpers ──
        function setStatus(type, msg) {
          statusMsg.className = 'status ' + type;
          statusMsg.textContent = msg;
        }

        function refreshBtn() {
          if (scannedUid && reason) {
            checkinBtn.disabled = false;
            checkinBtn.textContent = '✓ Check in — ' + reason;
            checkinBtn.className = 'ready';
          } else if (scannedUid) {
            checkinBtn.disabled = true;
            checkinBtn.textContent = 'Now select a reason above';
            checkinBtn.className = '';
          } else {
            checkinBtn.disabled = true;
            checkinBtn.textContent = 'Scan QR code first';
            checkinBtn.className = '';
          }
        }

        // ── Reason buttons ──
        document.querySelectorAll('.rbtn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.rbtn').forEach(function(b) { b.classList.remove('sel'); });
            btn.classList.add('sel');
            reason = btn.dataset.r;
            refreshBtn();
          });
        });

        // ── START CAMERA BUTTON ──
        startBtn.addEventListener('click', async function() {
          setStatus('info', 'Requesting camera permission...');

          // Check if browser supports getUserMedia
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setStatus('error', '⚠ Your browser does not support camera access. Please use Chrome or Safari.');
            return;
          }

          try {
            // Try rear camera first, fall back to any camera
            let stream;
            try {
              stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 640 } }
              });
            } catch (e) {
              // fallback to any camera
              stream = await navigator.mediaDevices.getUserMedia({ video: true });
            }

            video.srcObject = stream;
            viewfinder.classList.add('active');
            startBtn.classList.add('hide');

            video.onloadedmetadata = function() {
              video.play();
              scanning = true;
              setStatus('ok', '📷 Camera active — hold your QR code up to the camera');
              tick();
            };

          } catch (err) {
            console.error('Camera error:', err);
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
              setStatus('error', '🚫 Camera permission denied. Please tap the camera icon in your browser address bar and allow access, then refresh.');
            } else if (err.name === 'NotFoundError') {
              setStatus('error', '📷 No camera found on this device.');
            } else if (err.name === 'NotReadableError') {
              setStatus('error', '📷 Camera is already in use by another app. Close it and try again.');
            } else {
              setStatus('error', '⚠ Camera error: ' + err.message);
            }
          }
        });

        // ── QR scan loop ──
        function tick() {
          if (!scanning) { raf = requestAnimationFrame(tick); return; }

          if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            try {
              var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
              var code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
              if (code && code.data) {
                handleQR(code.data);
                return; // stop loop until handled
              }
            } catch(e) { /* ignore frame errors */ }
          }

          raf = requestAnimationFrame(tick);
        }

        // ── Handle scanned QR ──
        async function handleQR(raw) {
          scanning = false;
          setStatus('info', '🔍 QR detected, verifying...');

          var payload;
          try { payload = JSON.parse(raw); } catch(e) { payload = null; }

          if (!payload || !payload.uid) {
            setStatus('error', '❌ Invalid QR code. Please use your NEU Library QR code.');
            resume(3000); return;
          }

          var result = await db.from('users').select('*').eq('id', payload.uid).single();

          if (result.error || !result.data) {
            setStatus('error', '❌ Account not found. Please sign in manually.');
            resume(3000); return;
          }

          var user = result.data;

          if (user.is_blocked) {
            setStatus('error', '🚫 Access denied — your account has been blocked. Contact the library admin.');
            resume(4000); return;
          }

          // Show user card
          scannedUid = user.id;
          document.getElementById('uInitial').textContent  = (user.name || '?')[0].toUpperCase();
          document.getElementById('uName').textContent     = user.name    || '—';
          document.getElementById('uProgram').textContent  = user.program || '—';
          document.getElementById('uEmail').textContent    = user.email   || '—';
          document.getElementById('userCard').classList.add('show');
          setStatus('ok', '✓ ' + user.name + ' identified — select a reason and check in');
          refreshBtn();
        }

        // ── Check-in ──
        checkinBtn.addEventListener('click', async function() {
          if (!scannedUid || !reason) return;

          checkinBtn.disabled = true;
          checkinBtn.textContent = 'Logging visit...';
          checkinBtn.className = '';

          var result = await db.from('visit_logs').insert({
            user_id: scannedUid,
            reason: reason,
            status: 'inside',
            time_in: new Date().toISOString()
          });

          if (result.error) {
            setStatus('error', '❌ Failed to log visit: ' + result.error.message);
            refreshBtn();
            return;
          }

          var name = document.getElementById('uName').textContent;
          setStatus('ok', '✅ ' + name + ' checked in for "' + reason + '". Have a productive day!');
          reset(4000);
        });

        // ── Resume scanning after delay ──
        function resume(ms) {
          setTimeout(function() {
            document.getElementById('resultMsg') && (document.getElementById('resultMsg').style.display = 'none');
            setStatus('ok', '📷 Camera active — hold your QR code up to the camera');
            scanning = true;
            raf = requestAnimationFrame(tick);
          }, ms);
        }

        // ── Full reset for next person ──
        function reset(ms) {
          setTimeout(function() {
            scannedUid = null;
            reason = null;
            document.getElementById('userCard').classList.remove('show');
            document.querySelectorAll('.rbtn').forEach(function(b) { b.classList.remove('sel'); });
            refreshBtn();
            setStatus('ok', '📷 Ready for next person — hold QR code up to camera');
            scanning = true;
            raf = requestAnimationFrame(tick);
          }, ms);
        }

      }); // end window.onload
    </script>
  </body>
</html>
