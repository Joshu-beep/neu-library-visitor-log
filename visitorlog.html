<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEU Library Visitor Log</title>
    <link rel="icon" type="image/x-icon" href="neulogo.png" />
    <style>
      :root {
        --primary-blue: #001f54;
        --accent-gold: #f59e0b;
        --text-dark: #1e293b;
        --text-gray: #64748b;
        --light-border: #e2e8f0;
        --bg-fallback: #f8fafc;
        --btn-disabled: #94a3b8;
        --icon-orange: #f97316;
        --icon-blue: #3b82f6;
        --icon-purple: #a855f7;
        --icon-green: #22c55e;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }

      body {
        background-image: url("");
        background-color: var(--bg-fallback);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .navbar {
        background-color: var(--primary-blue);
        border-bottom: 4px solid var(--accent-gold);
        padding: 12px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #ffffff;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        z-index: 10;
      }

      .nav-left { display: flex; align-items: center; gap: 12px; }
      .nav-logo { width: 32px; height: 32px; object-fit: contain; background-color: rgba(255,255,255,0.1); border-radius: 4px; }
      .nav-title { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }

      .btn-signout {
        background: transparent; border: none; color: #ffffff; font-size: 14px;
        font-weight: 500; display: flex; align-items: center; gap: 8px;
        cursor: pointer; transition: opacity 0.2s;
      }
      .btn-signout:hover { opacity: 0.8; }
      .btn-signout svg { width: 18px; height: 18px; stroke: currentColor; }

      .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 24px; }

      .log-card {
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 550px;
        overflow: hidden;
      }

      .user-profile {
        padding: 24px 32px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid var(--light-border);
        background-color: #fcfcfd;
      }

      .avatar {
        width: 56px; height: 56px;
        background-color: #e2e8f0; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        color: var(--primary-blue);
      }
      .avatar svg { width: 28px; height: 28px; stroke: currentColor; }

      .user-details h3 { font-size: 18px; color: var(--text-dark); font-weight: 700; margin-bottom: 2px; }
      .user-details p { font-size: 13px; color: var(--text-gray); margin-bottom: 6px; }

      .badge {
        display: inline-block; background-color: #e0e7ff; color: #3730a3;
        font-size: 11px; font-weight: 700; padding: 4px 10px;
        border-radius: 12px; letter-spacing: 0.5px;
      }

      .card-body { padding: 32px; text-align: center; }
      .card-body h4 { font-size: 16px; color: var(--text-dark); margin-bottom: 24px; font-weight: 600; }

      .reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }

      .reason-option {
        border: 1.5px solid var(--light-border); border-radius: 12px; padding: 20px 10px;
        cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column;
        align-items: center; gap: 12px; background-color: #ffffff;
      }
      .reason-option:hover { border-color: #cbd5e1; background-color: #f8fafc; }
      .reason-option.selected {
        border-color: var(--primary-blue); background-color: #f0f4f8;
        box-shadow: 0 4px 12px rgba(0,31,84,0.08);
      }
      .reason-option svg { width: 28px; height: 28px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .icon-reading svg { stroke: var(--icon-orange); }
      .icon-researching svg { stroke: var(--icon-blue); }
      .icon-computer svg { stroke: var(--icon-purple); }
      .icon-meeting svg { stroke: var(--icon-green); }
      .reason-option span { font-size: 14px; font-weight: 600; color: var(--text-dark); }

      .btn-submit {
        width: 100%; padding: 16px; border-radius: 10px; border: none;
        font-size: 16px; font-weight: 700; color: #ffffff;
        background-color: var(--primary-blue); cursor: pointer; transition: all 0.2s ease;
      }
      .btn-submit:hover:not(:disabled) { background-color: #00153a; transform: translateY(-1px); }
      .btn-submit:active:not(:disabled) { transform: translateY(0); }
      .btn-submit:disabled { background-color: var(--btn-disabled); cursor: not-allowed; opacity: 0.8; }

      #msgBox {
        display: none; position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
        background-color: var(--primary-blue); color: white; padding: 16px 24px;
        border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000;
        font-weight: 500; font-size: 14px; text-align: center; min-width: 250px;
        animation: slideDown 0.3s ease-out;
      }
      @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 24px; opacity: 1; } }

      .modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
      }
      .modal-overlay.active { opacity: 1; visibility: visible; }

      .modal-content {
        background: white; padding: 40px; border-radius: 16px; text-align: center;
        max-width: 400px; width: 90%; transform: translateY(20px);
        transition: all 0.3s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }
      .modal-overlay.active .modal-content { transform: translateY(0); }

      .modal-icon {
        width: 64px; height: 64px; background: #f0fdf4; color: #16a34a;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px auto;
      }
      .modal-title { font-size: 24px; font-weight: 700; color: var(--primary-blue); margin-bottom: 10px; }
      .modal-text { color: var(--text-gray); margin-bottom: 24px; line-height: 1.5; font-size: 15px; }
      .countdown-text { font-weight: bold; color: var(--primary-blue); font-size: 18px; }

      @media (max-width: 500px) {
        .reason-grid { grid-template-columns: 1fr; }
        .user-profile { flex-direction: column; text-align: center; gap: 12px; }
      }
    </style>
  </head>
  <body>
    <div id="msgBox"></div>

    <!-- Welcome Modal -->
    <div id="welcomeModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 class="modal-title">Welcome to NEU Library</h2>
        <p class="modal-text">Your visit has been successfully logged. Have a productive day!</p>
        <p class="modal-text" style="font-size: 13px; margin-bottom: 0">
          Logging out automatically in <span id="countdown" class="countdown-text">5</span> seconds...
        </p>
      </div>
    </div>

    <header class="navbar">
      <div class="nav-left">
        <img src="neulogo.png" alt="neulogo" class="nav-logo" id="topLogo" onerror="this.style.display='none'" />
        <span class="nav-title">NEU Library Visitor Log</span>
      </div>
      <div class="nav-right">
        <button class="btn-signout" id="signOutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Cancel / Sign Out
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="log-card">
        <div class="user-profile">
          <div class="avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <div class="user-details">
            <h3 id="displayUserName">Loading...</h3>
            <p id="displayUserEmail">—</p>
            <span class="badge" id="displayUserProgram">—</span>
          </div>
        </div>

        <div class="card-body">
          <h4>What is your reason for visiting today?</h4>
          <div class="reason-grid">
            <div class="reason-option icon-reading" data-reason="Reading">
              <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
              <span>Reading</span>
            </div>
            <div class="reason-option icon-researching" data-reason="Researching">
              <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path><path d="M10 2v8l3-3 3 3V2"></path></svg>
              <span>Researching</span>
            </div>
            <div class="reason-option icon-computer" data-reason="Use of Computer">
              <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
              <span>Use of Computer</span>
            </div>
            <div class="reason-option icon-meeting" data-reason="Meeting">
              <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
              <span>Meeting</span>
            </div>
          </div>
          <button id="submitLogBtn" class="btn-submit" disabled>Log Visit</button>
        </div>
      </div>
    </main>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
      const SUPABASE_URL = 'https://ruajjuxabwfqpawpjosl.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1YWpqdXhhYndmcXBhd3Bqb3NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTg0MjksImV4cCI6MjA4OTAzNDQyOX0.O1ZbG4vC6q4DxQKTq664i3e4xwUYcvgVDOsuNMDNK4I';
      const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
      // Redirect if not logged in
      const userId = localStorage.getItem("userId");
      if (!userId) { window.location.href = "index.html"; }

      const reasonOptions = document.querySelectorAll(".reason-option");
      const submitLogBtn = document.getElementById("submitLogBtn");
      const welcomeModal = document.getElementById("welcomeModal");
      const countdownEl = document.getElementById("countdown");
      let selectedReason = null;

      // Load user details from localStorage
      document.getElementById("displayUserName").textContent = localStorage.getItem("userName") || "Guest";
      document.getElementById("displayUserEmail").textContent = localStorage.getItem("userEmail") || "—";
      document.getElementById("displayUserProgram").textContent = localStorage.getItem("userProgram") || "—";

      // Handle reason selection
      reasonOptions.forEach((option) => {
        option.addEventListener("click", () => {
          reasonOptions.forEach((opt) => opt.classList.remove("selected"));
          option.classList.add("selected");
          selectedReason = option.getAttribute("data-reason");
          submitLogBtn.disabled = false;
        });
      });

      function showMessage(msg) {
        const msgBox = document.getElementById("msgBox");
        msgBox.textContent = msg;
        msgBox.style.display = "block";
        setTimeout(() => { msgBox.style.display = "none"; }, 3000);
      }

      // ── SUBMIT VISIT LOG to Supabase ──
      submitLogBtn.addEventListener("click", async () => {
        if (!selectedReason) return;

        submitLogBtn.disabled = true;
        submitLogBtn.textContent = "Logging visit...";

        const { error } = await supabase.from("visit_logs").insert({
          user_id: userId,
          reason: selectedReason,
          status: "inside"
        });

        if (error) {
          showMessage("Failed to log visit: " + error.message);
          submitLogBtn.disabled = false;
          submitLogBtn.textContent = "Log Visit";
          return;
        }

        // Show welcome modal and countdown
        welcomeModal.classList.add("active");
        let timeLeft = 5;
        countdownEl.textContent = timeLeft;

        const timer = setInterval(() => {
          timeLeft--;
          countdownEl.textContent = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(timer);
            localStorage.clear();
            window.location.href = "index.html";
          }
        }, 1000);
      });

      // ── SIGN OUT ──
      document.getElementById("signOutBtn").addEventListener("click", async () => {
        await supabase.auth.signOut();
        localStorage.clear();
        showMessage("Signing out...");
        setTimeout(() => { window.location.href = "index.html"; }, 1200);
      });
    </script>
  </body>
</html>
