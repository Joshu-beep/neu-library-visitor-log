<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Era University Library</title>
    <link rel="icon" type="image/x-icon" href="/img/neulogo.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://ruajjuxabwfqpawpjosl.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1YWpqdXhhYndmcXBhd3Bqb3NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTg0MjksImV4cCI6MjA4OTAzNDQyOX0.O1ZbG4vC6q4DxQKTq664i3e4xwUYcvgVDOsuNMDNK4I";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <link rel="Stylesheet" href="/css/index.css" />
  </head>
  <body>
    <div id="msgBox"></div>

    <div class="login-wrapper">
      <div class="login-card">
        <div class="card-header" id="mainHeader">
          <div class="icon-container">
            <img
              src="neulogo.png"
              alt="Library Logo"
              class="logo-img"
              onerror="this.src = 'https://via.placeholder.com/64?text=NEU'"
            />
          </div>
          <h1 id="headerTitle">New Era University Library</h1>
          <h2 id="headerSubtitle">Visitor Management System</h2>
        </div>

        <!-- LOGIN VIEW -->
        <div class="card-body" id="loginView">
          <form id="loginForm">
            <div class="input-group">
              <label>Institutional Email</label>
              <input
                type="email"
                id="email"
                placeholder="Enter email..."
                required
              />
            </div>
            <div class="input-group">
              <label>Password</label>
              <input
                type="password"
                id="password"
                placeholder="Enter password..."
                required
              />
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">
              Sign In
            </button>
          </form>
          <div class="divider-container"><p>Don't have account yet?</p></div>
          <button type="button" class="btn btn-secondary" id="showRegisterBtn">
            Register Here
          </button>
        </div>

        <!-- REGISTRATION VIEW -->
        <div class="card-body" id="registerView" style="display: none">
          <div style="text-align: center; margin-bottom: 20px">
            <h3 style="color: var(--primary-blue); font-weight: 700">
              Create an Account
            </h3>
          </div>
          <div class="role-selector">
            <div class="role-card active" data-role="student">
              <span>Student</span>
            </div>
            <div class="role-card" data-role="faculty">
              <span>Faculty</span>
            </div>
          </div>
          <form id="registerForm">
            <div class="input-group text-left">
              <label>Institutional Email</label>
              <input
                type="email"
                id="regEmail"
                placeholder="e.g. j.doe@neu.edu.ph"
                required
              />
            </div>
            <div class="input-group text-left">
              <label>Password</label>
              <input
                type="password"
                id="regPassword"
                placeholder="Create a password"
                required
              />
            </div>
            <div class="input-row">
              <div class="input-group text-left">
                <label>Full Name</label>
                <input
                  type="text"
                  id="regName"
                  placeholder="Juan Dela Cruz"
                  required
                />
              </div>
              <div class="input-group text-left">
                <label>Program</label>
                <input
                  type="text"
                  id="regProgram"
                  placeholder="BSIT"
                  required
                />
              </div>
            </div>
            <button type="submit" class="btn btn-primary" id="registerBtn">
              Complete Registration
            </button>
          </form>
          <div style="text-align: center; margin-top: 20px">
            <a
              href="#"
              id="showLoginLink"
              style="font-size: 14px; color: var(--text-gray)"
              >Back to Login</a
            >
          </div>
        </div>

        <!-- ADMIN LOGIN VIEW -->
        <div class="card-body" id="adminView" style="display: none">
          <div style="text-align: center; margin-bottom: 20px">
            <h3 style="color: var(--admin-red); font-weight: 700">
              Admin Authentication
            </h3>
            <p style="font-size: 13px; color: var(--text-gray)">
              Restricted access to database
            </p>
          </div>
          <form id="adminLoginForm">
            <div class="input-group">
              <label>Admin Username</label>
              <input
                type="text"
                id="adminUser"
                placeholder="Admin username..."
                required
              />
            </div>
            <div class="input-group">
              <label>Secret Key</label>
              <input
                type="password"
                id="adminPass"
                placeholder="••••••••"
                required
              />
            </div>
            <button type="submit" class="btn btn-admin">Access Database</button>
          </form>
          <div style="text-align: center; margin-top: 20px">
            <a
              href="#"
              id="backFromAdmin"
              style="font-size: 14px; color: var(--text-gray)"
              >Back to Visitor Access</a
            >
          </div>
        </div>
      </div>

      <div class="footer-links">
        <a class="admin-link" id="adminBtn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="6" y="11" width="12" height="10" rx="2" ry="2"></rect>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
          </svg>
          Admin Access
        </a>
        <p class="copyright">© 2026 New Era University Library</p>
      </div>
    </div>

    <script src="js/index.js"></script>
  </body>
</html>
