<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Era University Library</title>
    <link rel="icon" type="image/x-icon" href="neulogo.png" />

    <style>
      :root {
        --primary-blue: #001f54;
        --accent-gold: #f59e0b;
        --text-gray: #64748b;
        --light-border: #cbd5e1;
        --bg-fallback: #f4f6f9;
        --admin-red: #991b1b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-image: url("backgroundimg.jpg");
        background-color: var(--bg-fallback);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        display: flex;
        /* Changed from justify-content: flex-end to flex-start for left placement */
        justify-content: flex-start;
        align-items: stretch;
        min-height: 100vh;
        padding: 0;
        overflow: hidden;
      }

      .login-wrapper {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        background: #ffffff;
        /* Changed shadow to the right side since panel is on the left */
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.15);
        z-index: 10;
        min-height: 100vh;
        overflow-y: auto;
      }

      @media (max-width: 800px) {
        .login-wrapper {
          max-width: 100%;
          box-shadow: none;
        }
        body {
          overflow: auto;
        }
      }

      .login-card {
        background: transparent;
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .card-header {
        background-color: var(--primary-blue);
        color: #ffffff;
        text-align: center;
        padding: 30px 20px 25px;
        border-bottom: 4px solid var(--accent-gold);
        transition: background-color 0.3s ease;
      }

      .card-header.admin-mode {
        background-color: var(--admin-red);
      }

      .icon-container {
        margin-bottom: 12px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 64px;
        height: 64px;
        border: 2px solid var(--accent-gold);
        border-radius: 50%;
        overflow: hidden;
        background-color: white;
      }

      .logo-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 8px;
      }

      .card-header h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }

      .card-header h2 {
        font-size: 12px;
        color: var(--accent-gold);
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .card-body {
        padding: 30px 40px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-row {
        display: flex;
        gap: 15px;
      }

      .input-row .input-group {
        flex: 1;
      }

      .input-group label {
        display: block;
        text-align: center;
        font-size: 14px;
        color: var(--text-gray);
        margin-bottom: 8px;
        font-weight: 600;
      }

      .input-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--light-border);
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
        text-align: center;
      }

      .text-left label {
        text-align: left;
      }

      .text-left input {
        text-align: left;
      }

      .input-group input:focus {
        border-color: var(--primary-blue);
      }

      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        outline: none;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background-color: var(--primary-blue);
        color: #ffffff;
        border: none;
        margin-top: 5px;
      }

      .btn-admin {
        background-color: var(--admin-red);
        color: #ffffff;
        border: none;
      }

      .divider-container {
        text-align: center;
        margin: 24px 0 20px;
        position: relative;
      }

      .divider-container::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background-color: #f1f5f9;
        z-index: 1;
      }

      .divider-container p {
        font-size: 13px;
        color: #94a3b8;
        background-color: #ffffff;
        padding: 0 10px;
        display: inline-block;
        position: relative;
        z-index: 2;
      }

      .btn-secondary {
        background-color: #ffffff;
        color: var(--primary-blue);
        border: 1.5px solid var(--primary-blue);
      }

      .footer-links {
        text-align: center;
        color: #94a3b8;
        font-size: 13px;
        background-color: #f8fafc;
        padding: 20px;
        border-top: 1px solid var(--light-border);
        margin-top: auto;
      }

      .admin-link {
        display: inline-flex;
        align-items: center;
        color: #64748b;
        text-decoration: none;
        margin-bottom: 8px;
        font-weight: 600;
        cursor: pointer;
      }

      .admin-link:hover {
        color: var(--primary-blue);
      }

      .admin-link svg {
        width: 16px;
        height: 16px;
        margin-right: 6px;
        stroke: currentColor;
      }

      .role-selector {
        display: flex;
        gap: 15px;
        margin-bottom: 24px;
      }

      .role-card {
        flex: 1;
        border: 1px solid var(--light-border);
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        transition: all 0.2s ease;
        color: var(--text-gray);
      }

      .role-card.active {
        border-color: var(--primary-blue);
        color: var(--primary-blue);
        background-color: #f8fafc;
      }

      #msgBox {
        display: none;
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--primary-blue);
        color: white;
        padding: 16px 24px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        z-index: 1000;
        font-size: 15px;
        text-align: center;
        min-width: 250px;
        animation: slideDown 0.3s ease-out;
      }

      @keyframes slideDown {
        from {
          top: -50px;
          opacity: 0;
        }
        to {
          top: 24px;
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="msgBox"></div>

    <div class="login-wrapper">
      <div class="login-card">
        <!-- Shared Header Section -->
        <div class="card-header" id="mainHeader">
          <div class="icon-container">
            <img
              src="neulogo.png"
              alt="Library Logo"
              class="logo-img"
              onerror="this.src = 'https://via.placeholder.com/64?text=NEU'"
            />
          </div>
          <h1 id="headerTitle">New Era University Library</h1>
          <h2 id="headerSubtitle">Visitor Management System</h2>
        </div>

        <!-- LOGIN VIEW -->
        <div class="card-body" id="loginView">
          <form id="loginForm">
            <div class="input-group">
              <label>Institutional Email</label>
              <input
                type="email"
                id="email"
                placeholder="Enter email..."
                required
              />
            </div>
            <div class="input-group">
              <label>Password</label>
              <input
                type="password"
                id="password"
                placeholder="Enter password..."
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
          </form>
          <div class="divider-container">
            <p>Don't have account yet?</p>
          </div>
          <button type="button" class="btn btn-secondary" id="showRegisterBtn">
            Register Here
          </button>
        </div>

        <!-- REGISTRATION VIEW -->
        <div class="card-body" id="registerView" style="display: none">
          <div style="text-align: center; margin-bottom: 20px">
            <h3 style="color: var(--primary-blue); font-weight: 700">
              Create an Account
            </h3>
          </div>
          <div class="role-selector">
            <div class="role-card active" data-role="student">
              <span>Student</span>
            </div>
            <div class="role-card" data-role="faculty">
              <span>Faculty</span>
            </div>
          </div>
          <form id="registerForm">
            <div class="input-group text-left">
              <label>Institutional Email</label>
              <input
                type="email"
                id="regEmail"
                placeholder="e.g. j.doe@neu.edu.ph"
                required
              />
            </div>
            <div class="input-group text-left">
              <label>Password</label>
              <input
                type="password"
                id="regPassword"
                placeholder="Create a password"
                required
              />
            </div>
            <div class="input-row">
              <div class="input-group text-left">
                <label>Full Name</label>
                <input
                  type="text"
                  id="regName"
                  placeholder="Juan Dela Cruz"
                  required
                />
              </div>
              <div class="input-group text-left">
                <label>Program</label>
                <input
                  type="text"
                  id="regProgram"
                  placeholder="BSIT"
                  required
                />
              </div>
            </div>
            <button type="submit" class="btn btn-primary">
              Complete Registration
            </button>
          </form>
          <div style="text-align: center; margin-top: 20px">
            <a
              href="#"
              id="showLoginLink"
              style="font-size: 14px; color: var(--text-gray)"
              >Back to Login</a
            >
          </div>
        </div>

        <!-- ADMIN LOGIN VIEW -->
        <div class="card-body" id="adminView" style="display: none">
          <div style="text-align: center; margin-bottom: 20px">
            <h3 style="color: var(--admin-red); font-weight: 700">
              Admin Authentication
            </h3>
            <p style="font-size: 13px; color: var(--text-gray)">
              Restricted access to database
            </p>
          </div>
          <form id="adminLoginForm">
            <div class="input-group">
              <label>Admin Username</label>
              <input
                type="text"
                id="adminUser"
                placeholder="Admin username..."
                required
              />
            </div>
            <div class="input-group">
              <label>Secret Key</label>
              <input
                type="password"
                id="adminPass"
                placeholder="••••••••"
                required
              />
            </div>
            <button type="submit" class="btn btn-admin">Access Database</button>
          </form>
          <div style="text-align: center; margin-top: 20px">
            <a
              href="#"
              id="backFromAdmin"
              style="font-size: 14px; color: var(--text-gray)"
              >Back to Visitor Access</a
            >
          </div>
        </div>
      </div>

      <div class="footer-links">
        <a class="admin-link" id="adminBtn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="6" y="11" width="12" height="10" rx="2" ry="2"></rect>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
          </svg>
          Admin Access
        </a>
        <p class="copyright">© 2026 New Era University Library</p>
      </div>
    </div>

    <script>
      const loginView = document.getElementById("loginView");
      const registerView = document.getElementById("registerView");
      const adminView = document.getElementById("adminView");
      const mainHeader = document.getElementById("mainHeader");
      const headerSubtitle = document.getElementById("headerSubtitle");

      // Navigation Logic
      document.getElementById("showRegisterBtn").onclick = () => {
        loginView.style.display = "none";
        registerView.style.display = "flex";
      };

      document.getElementById("showLoginLink").onclick = (e) => {
        e.preventDefault();
        registerView.style.display = "none";
        loginView.style.display = "flex";
      };

      // Admin Access Toggle
      document.getElementById("adminBtn").onclick = (e) => {
        e.preventDefault();
        loginView.style.display = "none";
        registerView.style.display = "none";
        adminView.style.display = "flex";
        mainHeader.classList.add("admin-mode");
        headerSubtitle.textContent = "Admin Control Panel";
        showMessage("Switching to Administrator Mode");
      };

      document.getElementById("backFromAdmin").onclick = (e) => {
        e.preventDefault();
        adminView.style.display = "none";
        loginView.style.display = "flex";
        mainHeader.classList.remove("admin-mode");
        headerSubtitle.textContent = "Visitor Management System";
      };

      function showMessage(msg, color = "#001f54") {
        const msgBox = document.getElementById("msgBox");
        msgBox.textContent = msg;
        msgBox.style.backgroundColor = color;
        msgBox.style.display = "block";
        setTimeout(() => {
          msgBox.style.display = "none";
        }, 3000);
      }

      // Login Forms Handling
      document.getElementById("loginForm").onsubmit = (e) => {
        e.preventDefault();
        showMessage("Login successful!");
        setTimeout(() => {
          window.location.href = "visitorlog.html";
        }, 1000);
      };

      document.getElementById("adminLoginForm").onsubmit = (e) => {
        e.preventDefault();
        const user = document.getElementById("adminUser").value;
        const pass = document.getElementById("adminPass").value;

        if (user === "admin" && pass === "admin123") {
          showMessage("Access Granted. Redirecting to Database...", "#16a34a");
          setTimeout(() => {
            window.location.href = "admindashboard.html";
          }, 1500);
        } else {
          showMessage("Invalid Admin Credentials!", "#991b1b");
        }
      };

      document.getElementById("registerForm").onsubmit = (e) => {
        e.preventDefault();
        showMessage("Registration successful!");
        setTimeout(() => {
          window.location.href = "visitorlog.html";
        }, 1000);
      };

      // Role Selection
      document.querySelectorAll(".role-card").forEach((card) => {
        card.onclick = () => {
          document
            .querySelectorAll(".role-card")
            .forEach((c) => c.classList.remove("active"));
          card.classList.add("active");
          document.getElementById("regProgram").placeholder =
            card.dataset.role === "student" ? "BSIT" : "Faculty Dept";
        };
      });
    </script>
  </body>
</html>
